<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <linearGradient id="azureBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e6f0fa"/>
    </linearGradient>
    <linearGradient id="azureBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#00A4EF"/>
    </linearGradient>
  </defs>
  <rect width="600" height="350" fill="url(#azureBg)"/>
  <circle cx="500" cy="70" r="140" fill="rgba(0, 120, 212, 0.08)"/>
  <circle cx="90" cy="280" r="100" fill="rgba(0, 164, 239, 0.06)"/>
  
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="480" height="190" rx="16" fill="#ffffff" stroke="rgba(0, 120, 212, 0.3)" stroke-width="2" filter="drop-shadow(0 4px 12px rgba(0,0,0,0.06))"/>
    
    <!-- Azure Logo Icon -->
    <rect x="30" y="35" width="70" height="70" rx="14" fill="url(#azureBlue)"/>
    <path d="M52 48 L75 88 L90 88 L65 48 Z M62 48 L80 78 L50 78 Z" fill="#ffffff"/>
    
    <text x="120" y="65" font-family="'Poppins', sans-serif" font-size="22" font-weight="700" fill="#0f172a">Microsoft Azure</text>
    <text x="120" y="92" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" fill="#64748b">Azure AD • Virtual Machines • Azure DevOps</text>
    
    <rect x="30" y="130" width="140" height="32" rx="16" fill="rgba(0, 120, 212, 0.12)"/>
    <text x="100" y="151" font-family="'Poppins', sans-serif" font-size="12" font-weight="700" fill="#0078D4" text-anchor="middle">Azure Administrator</text>
    
    <rect x="185" y="130" width="140" height="32" rx="16" fill="rgba(0, 164, 239, 0.12)"/>
    <text x="255" y="151" font-family="'Poppins', sans-serif" font-size="12" font-weight="700" fill="#0082c4" text-anchor="middle">Hybrid Cloud</text>
  </g>
  <rect x="0" y="344" width="600" height="6" fill="url(#azureBlue)"/>
</svg>