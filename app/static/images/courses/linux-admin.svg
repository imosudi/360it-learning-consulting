<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <linearGradient id="linBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5f5"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
    <linearGradient id="linGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
  <rect width="600" height="350" fill="url(#linBg)"/>
  <circle cx="500" cy="70" r="140" fill="rgba(220, 38, 38, 0.08)"/>
  
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="480" height="190" rx="16" fill="#ffffff" stroke="rgba(220, 38, 38, 0.3)" stroke-width="2" filter="drop-shadow(0 4px 12px rgba(0,0,0,0.06))"/>
    <rect x="30" y="35" width="70" height="70" rx="14" fill="url(#linGrad)"/>
    
    <!-- Terminal Prompt Icon -->
    <text x="65" y="77" font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">$ _</text>
    
    <text x="120" y="65" font-family="'Poppins', sans-serif" font-size="22" font-weight="700" fill="#0f172a">Linux Administration</text>
    <text x="120" y="92" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" fill="#64748b">Red Hat • Ubuntu • Bash Shell • LVM</text>
    
    <rect x="30" y="130" width="140" height="32" rx="16" fill="rgba(220, 38, 38, 0.12)"/>
    <text x="100" y="151" font-family="'Poppins', sans-serif" font-size="12" font-weight="700" fill="#dc2626" text-anchor="middle">RHCSA Ready</text>
    
    <rect x="185" y="130" width="150" height="32" rx="16" fill="rgba(15, 23, 42, 0.1)"/>
    <text x="260" y="151" font-family="'Poppins', sans-serif" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">Shell Automation</text>
  </g>
  <rect x="0" y="344" width="600" height="6" fill="url(#linGrad)"/>
