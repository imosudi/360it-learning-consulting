<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <linearGradient id="awsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8f0"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="awsOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9900"/>
      <stop offset="100%" stop-color="#FF5500"/>
    </linearGradient>
  </defs>
  <rect width="600" height="350" fill="url(#awsBg)"/>
  <!-- Decorative Circles -->
  <circle cx="520" cy="60" r="140" fill="rgba(255, 153, 0, 0.08)"/>
  <circle cx="80" cy="290" r="100" fill="rgba(13, 110, 253, 0.06)"/>
  
  <!-- AWS Cloud Hero Visual -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="480" height="190" rx="16" fill="#ffffff" stroke="rgba(255, 153, 0, 0.3)" stroke-width="2" filter="drop-shadow(0 4px 12px rgba(0,0,0,0.06))"/>
    
    <!-- Icon Box -->
    <rect x="30" y="35" width="70" height="70" rx="14" fill="url(#awsOrange)"/>
    <path d="M65 55 C55 55 48 62 48 70 C48 78 55 85 65 85 C73 85 80 80 82 73 C87 73 90 69 90 64 C90 59 86 55 81 55 C79 50 72 46 65 55 Z" fill="#ffffff"/>
    
    <!-- Title & Text -->
    <text x="120" y="65" font-family="'Poppins', sans-serif" font-size="22" font-weight="700" fill="#0f172a">AWS Cloud Engineering</text>
    <text x="120" y="92" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" fill="#64748b">EC2 • S3 • VPC • IAM • Cloud Architecture</text>
    
    <!-- Pill badges -->
    <rect x="30" y="130" width="130" height="32" rx="16" fill="rgba(255, 153, 0, 0.12)"/>
    <text x="95" y="151" font-family="'Poppins', sans-serif" font-size="12" font-weight="700" fill="#d97706" text-anchor="middle">AWS Certified</text>
    
    <rect x="175" y="130" width="150" height="32" rx="16" fill="rgba(13, 110, 253, 0.1)"/>
    <text x="250" y="151" font-family="'Poppins', sans-serif" font-size="12" font-weight="700" fill="#0d6efd" text-anchor="middle">Hands-on Labs</text>
  </g>
  <rect x="0" y="344" width="600" height="6" fill="url(#awsOrange)"/>
</svg>